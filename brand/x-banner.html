<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1500px; height: 500px; overflow: hidden; }
  .banner {
    position: relative;
    width: 1500px;
    height: 500px;
    background: #14291F;
    font-family: 'Hanken Grotesk', sans-serif;
    color: #F3EEE4;
    overflow: hidden;
  }
  /* gold corner glows, mirroring the site hero */
  .glow1 {
    position: absolute; inset: 0;
    background: radial-gradient(55% 90% at 92% -15%, rgba(198,166,100,.32), transparent 60%);
  }
  .glow2 {
    position: absolute; inset: 0;
    background: radial-gradient(40% 70% at 8% 115%, rgba(198,166,100,.10), transparent 60%);
  }
  /* oversized signature spark, barely-there, for bottom-right balance
     (a zone the avatar never reaches) */
  .watermark {
    position: absolute;
    right: 60px;
    bottom: -70px;
    width: 300px;
    height: 300px;
    opacity: 0.09;
  }
  /* All content lives in the top band — X's avatar circle overlaps the
     bottom-left up to roughly two-thirds of the banner height. */
  .content {
    position: relative;
    z-index: 2;
    padding: 46px 90px 0;
  }
  .brandRow { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
  .wordmark { font-weight: 800; font-size: 28px; letter-spacing: -0.015em; }
  .kicker {
    margin-left: 20px;
    padding-left: 20px;
    border-left: 1px solid rgba(243,238,228,.25);
    font-size: 14px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: #DCC592;
  }
  .headline {
    font-weight: 800;
    font-size: 80px;
    line-height: 1.02;
    letter-spacing: -0.035em;
    max-width: 1180px;
    margin-bottom: 24px;
  }
  .headline .em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: #C6A664;
    letter-spacing: -0.01em;
  }
  .proof {
    font-size: 19px;
    font-weight: 500;
    color: rgba(243,238,228,.72);
  }
  .proof .spark { color: #C6A664; margin-right: 10px; }
</style>
</head>
<body>
  <div class="banner">
    <div class="glow1"></div>
    <div class="glow2"></div>
    <svg class="watermark" viewBox="0 0 100 100" aria-hidden="true">
      <path fill="#C6A664" d="M50 5 C54.5 38 62 45.5 95 50 C62 54.5 54.5 62 50 95 C45.5 62 38 54.5 5 50 C38 45.5 45.5 38 50 5 Z"/>
    </svg>
    <div class="content">
      <div class="brandRow">
        <svg width="30" height="30" viewBox="0 0 100 100" aria-hidden="true">
          <path fill="#C6A664" d="M50 5 C54.5 38 62 45.5 95 50 C62 54.5 54.5 62 50 95 C45.5 62 38 54.5 5 50 C38 45.5 45.5 38 50 5 Z"/>
        </svg>
        <span class="wordmark">Ben Walther</span>
        <span class="kicker">Life &amp; Personal Growth Coach</span>
      </div>

      <div class="headline">
        You weren&rsquo;t created to settle. <span class="em">Let&rsquo;s prove it.</span>
      </div>

      <div class="proof"><span class="spark">✦</span>From classrooms and courts to your corner.</div>
    </div>
  </div>
</body>
</html>

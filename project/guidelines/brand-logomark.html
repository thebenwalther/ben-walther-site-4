<!-- @dsCard group="Brand" viewport="700x360" name="Logomark" subtitle="Spark mark (recommended) + two alternates, with lockups" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-page);font-family:var(--font-sans);}
  .row{display:flex;gap:18px;}
  .opt{flex:1;background:var(--bw-white);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);
    padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:var(--shadow-sm);}
  .opt.pick{border:1.5px solid var(--accent);}
  .tile{width:84px;height:84px;border-radius:22px;display:flex;align-items:center;justify-content:center;}
  .nm{font-size:12.5px;font-weight:700;color:var(--text-strong);}
  .tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}
  .lock{margin-top:22px;display:flex;gap:30px;align-items:stretch;}
  .card{flex:1;border-radius:var(--radius-lg);padding:22px 24px;display:flex;align-items:center;gap:14px;}
  .light{background:var(--bw-white);border:1px solid var(--border-subtle);}
  .dark{background:var(--surface-dark);}
  .wm{font-weight:800;font-size:24px;letter-spacing:-.02em;white-space:nowrap;}
  .card svg{flex-shrink:0;}
  .light .wm{color:var(--text-strong);}
  .dark .wm{color:var(--text-on-dark);}
  .stack{flex-direction:column;gap:10px;text-align:center;justify-content:center;}
  svg{display:block;}
</style></head><body>
  <div class="row">
    <!-- Concept 1: Spark (recommended) -->
    <div class="opt pick">
      <div class="tag">Recommended</div>
      <div class="tile" style="background:var(--bw-forest)">
        <svg width="48" height="48" viewBox="0 0 100 100"><path fill="#C6A664" d="M50 12 C53.6 40 59.5 45.9 88 50 C59.5 54.1 53.6 60 50 88 C46.4 60 40.5 54.1 12 50 C40.5 45.9 46.4 40 50 12 Z"/></svg>
      </div>
      <div class="nm">The Spark</div>
    </div>
    <!-- Concept 2: Monogram -->
    <div class="opt">
      <div class="tag" style="color:var(--text-muted)">Alternate</div>
      <div class="tile" style="background:var(--bw-forest)">
        <span style="font-family:var(--font-sans);font-weight:800;font-size:36px;letter-spacing:-.04em;color:var(--bw-gold)">bw</span>
      </div>
      <div class="nm">Monogram</div>
    </div>
    <!-- Concept 3: Ascend -->
    <div class="opt">
      <div class="tag" style="color:var(--text-muted)">Alternate</div>
      <div class="tile" style="background:var(--bw-forest)">
        <svg width="50" height="50" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="40" fill="none" stroke="#DCC592" stroke-width="4" opacity=".5"/>
          <path d="M30 62 L50 42 L70 62" fill="none" stroke="#C6A664" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="50" cy="26" r="4.5" fill="#C6A664"/>
        </svg>
      </div>
      <div class="nm">Ascend</div>
    </div>
  </div>

  <div class="lock">
    <div class="card light">
      <svg width="34" height="34" viewBox="0 0 100 100"><path fill="#C6A664" d="M50 12 C53.6 40 59.5 45.9 88 50 C59.5 54.1 53.6 60 50 88 C46.4 60 40.5 54.1 12 50 C40.5 45.9 46.4 40 50 12 Z"/></svg>
      <span class="wm">Ben Walther</span>
    </div>
    <div class="card dark">
      <svg width="30" height="30" viewBox="0 0 100 100" style="border-radius:9px;background:rgba(220,197,146,.0)"><path fill="#C6A664" d="M50 12 C53.6 40 59.5 45.9 88 50 C59.5 54.1 53.6 60 50 88 C46.4 60 40.5 54.1 12 50 C40.5 45.9 46.4 40 50 12 Z"/></svg>
      <span class="wm">Ben Walther</span>
    </div>
    <div class="card dark stack">
      <svg width="40" height="40" viewBox="0 0 100 100"><rect width="100" height="100" rx="26" fill="#C6A664"/><path fill="#14291F" d="M50 22 C52.9 44 57.6 48.7 78 50 C57.6 51.3 52.9 56 50 78 C47.1 56 42.4 51.3 22 50 C42.4 48.7 47.1 44 50 22 Z"/></svg>
      <span class="wm" style="font-size:18px">Ben Walther</span>
    </div>
  </div>
</body></html>

<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="8px cards → fully-pill buttons" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-page);display:flex;gap:18px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:84px;height:60px;background:var(--bw-white);border:1.5px solid var(--bw-forest);}
  .lab{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:8px;}
  .pill{width:120px;height:46px;background:var(--accent);border:none;border-radius:var(--radius-pill);}
</style></head><body>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm · 12</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md · 16</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · 20</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lab">2xl · 28</div></div>
  <div class="item"><div class="pill"></div><div class="lab">pill · btns</div></div>
</body></html>

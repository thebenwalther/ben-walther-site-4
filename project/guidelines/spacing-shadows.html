<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Soft, warm, low-spread — lifted not floating" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 28px;background:var(--surface-page);display:flex;gap:26px;align-items:center;}
  .item{text-align:center;}
  .box{width:130px;height:80px;background:var(--bw-white);border-radius:var(--radius-lg);}
  .lab{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:14px;}
</style></head><body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-accent);background:var(--accent)"></div><div class="lab">accent glow</div></div>
</body></html>

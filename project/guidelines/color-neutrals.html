<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals & text" subtitle="Warm ink, muted grey, cream surfaces" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .chip{height:84px;}
  .meta{padding:10px 12px;background:var(--bw-white);}
  .nm{font-family:var(--font-sans);font-weight:700;font-size:13px;color:var(--text-strong);}
  .hex{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:2px;}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bw-ink)"></div><div class="meta"><div class="nm">Ink</div><div class="hex">#23231E · body</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bw-muted)"></div><div class="meta"><div class="nm">Muted</div><div class="hex">#6E6A5E · secondary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bw-paper-2)"></div><div class="meta"><div class="nm">Cream 2</div><div class="hex">#ECE3D4 · panels</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bw-white);box-shadow:inset 0 0 0 1px var(--border-subtle)"></div><div class="meta"><div class="nm">White</div><div class="hex">#FBF8F2 · cards</div></div></div>
  </div>
</body></html>

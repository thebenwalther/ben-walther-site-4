<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-page);}
  .lead{font-family:var(--font-sans);font-weight:400;font-size:20px;line-height:1.5;
    color:var(--text-muted);margin:0 0 14px;max-width:52ch;}
  .body{font-family:var(--font-sans);font-weight:400;font-size:16px;line-height:1.55;
    color:var(--text-body);margin:0;max-width:60ch;}
  b{font-weight:700;color:var(--text-strong);}
</style></head><body>
  <p class="lead">Lead copy sets the tone — warm, direct, a touch literary. Used for hero subheads and section intros.</p>
  <p class="body">Body text carries the detail. It stays honest and plain-spoken, never clinical. <b>Bold</b> lifts the words that matter, and the measure stays generous so nothing feels cramped.</p>
</body></html>

<!-- @dsCard group="Brand" viewport="700x170" name="Proof & ratings" subtitle="Gold stars, stat numerals, 'as featured in' strip" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-page);}
  .stats{display:flex;gap:40px;}
  .n{font-family:var(--font-sans);font-weight:800;font-size:38px;letter-spacing:-.02em;color:var(--text-strong);line-height:1;}
  .n span{color:var(--accent);}
  .l{font-family:var(--font-sans);font-size:13px;color:var(--text-muted);margin-top:6px;}
  .rate{display:flex;align-items:center;gap:10px;margin-top:22px;font-family:var(--font-sans);font-size:14px;color:var(--text-muted);}
  .rate b{color:var(--text-strong);}
</style></head><body>
  <div class="stats">
    <div><div class="n">400<span>+</span></div><div class="l">clients coached</div></div>
    <div><div class="n">1.2<span>M</span></div><div class="l">podcast downloads</div></div>
    <div><div class="n">94<span>%</span></div><div class="l">renew or refer</div></div>
  </div>
  <div class="rate"><span class="bw-stars">★★★★★</span> <span><b>4.9</b> average from 400+ clients</span></div>
</body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;display:flex;}
  .half{flex:1;padding:40px 32px;display:flex;align-items:center;gap:13px;}
  .light{background:var(--surface-page);}
  .dark{background:var(--surface-dark);}
  .wm{font-family:var(--font-sans);font-weight:800;font-size:30px;letter-spacing:-.02em;}
  .light .wm{color:var(--text-strong);}
  .dark .wm{color:var(--text-on-dark);}
  .dot{color:var(--accent);}
</style></head><body>
  <div class="half light"><svg width="30" height="30" viewBox="0 0 100 100"><path fill="#C6A664" d="M50 12 C53.6 40 59.5 45.9 88 50 C59.5 54.1 53.6 60 50 88 C46.4 60 40.5 54.1 12 50 C40.5 45.9 46.4 40 50 12 Z"/></svg><span class="wm">Ben Walther</span></div>
  <div class="half dark"><svg width="30" height="30" viewBox="0 0 100 100"><path fill="#C6A664" d="M50 12 C53.6 40 59.5 45.9 88 50 C59.5 54.1 53.6 60 50 88 C46.4 60 40.5 54.1 12 50 C40.5 45.9 46.4 40 50 12 Z"/></svg><span class="wm">Ben Walther<span class="dot">.</span></span></div>
</body></html>

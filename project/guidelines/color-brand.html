<!-- @dsCard group="Colors" viewport="700x190" name="Brand palette" subtitle="Forest, gold & cream — the core three" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .chip{height:84px;}
  .meta{padding:10px 12px;background:var(--bw-white);}
  .nm{font-family:var(--font-sans);font-weight:700;font-size:13px;color:var(--text-strong);}
  .hex{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:2px;}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bw-forest)"></div><div class="meta"><div class="nm">Forest</div><div class="hex">#1C3A2E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bw-forest-deep)"></div><div class="meta"><div class="nm">Forest Deep</div><div class="hex">#14291F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bw-gold)"></div><div class="meta"><div class="nm">Gold</div><div class="hex">#C6A664</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bw-paper)"></div><div class="meta"><div class="nm">Cream</div><div class="hex">#F3EEE4</div></div></div>
  </div>
</body></html>

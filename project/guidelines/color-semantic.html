<!-- @dsCard group="Colors" viewport="700x150" name="Semantic / feedback" subtitle="Warm-shifted status colors, used sparingly" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .chip{height:60px;}
  .meta{padding:9px 12px;background:var(--bw-white);}
  .nm{font-family:var(--font-sans);font-weight:700;font-size:13px;color:var(--text-strong);}
  .hex{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:2px;}
</style></head><body>
  <div class="sw"><div class="chip" style="background:var(--positive)"></div><div class="meta"><div class="nm">Positive</div><div class="hex">#4F7A52</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="meta"><div class="nm">Warning</div><div class="hex">#C98A2E</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--critical)"></div><div class="meta"><div class="nm">Critical</div><div class="hex">#B24A38</div></div></div>
</body></html>

<!-- @dsCard group="Colors" viewport="700x200" name="Accent on dark" subtitle="Gold reads as the call-to-action on forest" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--surface-dark);}
  .stage{padding:26px 28px;display:flex;align-items:center;gap:22px;}
  .kick{color:var(--accent-soft);}
  h3{font-family:var(--font-sans);font-weight:800;font-size:26px;letter-spacing:-.02em;
    color:var(--text-on-dark);margin:10px 0 0;line-height:1.05;}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:var(--accent-ink);
    font-family:var(--font-sans);font-weight:700;font-size:15px;padding:14px 24px;border-radius:var(--radius-pill);}
  .left{flex:1;}
</style></head><body>
  <div class="stage">
    <div class="left">
      <span class="bw-kicker kick">✦ The accent at work</span>
      <h3>Gold is reserved for one thing: <span class="bw-em" style="color:var(--accent)">action</span>.</h3>
    </div>
    <a class="btn">Book a call →</a>
  </div>
</body></html>

<!-- @dsCard group="Type" viewport="700x200" name="Editorial serif accent" subtitle="Instrument Serif italic — one phrase, never a paragraph" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px 28px;background:var(--surface-page);}
  .big{font-family:var(--font-sans);font-weight:800;font-size:40px;line-height:1.04;
    letter-spacing:-.03em;color:var(--text-strong);margin:0;}
  .big .bw-em{color:var(--accent);font-size:42px;}
  .note{font-family:var(--font-sans);font-size:13px;color:var(--text-muted);margin-top:18px;}
</style></head><body>
  <p class="big">You weren't built to settle. <span class="bw-em">Let's prove it.</span></p>
  <p class="note">The serif italic marks a single emotional phrase — pull-quotes and ordinal numerals too. Never body copy.</p>
</body></html>
